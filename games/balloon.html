<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎈 Balloon Pop! - Kushal's Birthday</title>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/games.css"/>
  <style>
    #balloon-arena {
      width: min(700px, 95vw);
      height: 480px;
      position: relative;
      cursor: crosshair;
    }
    .balloon {
      position: absolute;
      font-size: 2.8rem;
      cursor: pointer;
      transition: transform 0.1s;
      user-select: none;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
      animation: floatBalloon linear infinite;
    }
    .balloon:hover { transform: scale(1.2); }
    .balloon.popping {
      animation: popAnim 0.3s ease-out forwards !important;
    }
    @keyframes floatBalloon {
      0%   { transform: translateX(0) translateY(0); }
      25%  { transform: translateX(10px) translateY(-8px); }
      50%  { transform: translateX(-5px) translateY(-15px); }
      75%  { transform: translateX(-10px) translateY(-8px); }
      100% { transform: translateX(0) translateY(0); }
    }
    @keyframes popAnim {
      0%   { transform: scale(1); opacity: 1; }
      50%  { transform: scale(1.8); opacity: 0.8; }
      100% { transform: scale(0.1); opacity: 0; }
    }
    .pop-text {
      position: absolute;
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: var(--yellow);
      text-shadow: 2px 2px 0 var(--orange);
      pointer-events: none;
      animation: popTextAnim 0.8s ease-out forwards;
      z-index: 20;
    }
    @keyframes popTextAnim {
      0%   { transform: scale(0) translateY(0); opacity: 1; }
      50%  { transform: scale(1.3) translateY(-20px); opacity: 1; }
      100% { transform: scale(0.8) translateY(-50px); opacity: 0; }
    }
    .progress-bar-wrap {
      width: min(700px, 95vw);
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      height: 16px;
      margin: 0.5rem auto;
      border: 2px solid rgba(255,255,255,0.2);
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--yellow));
      border-radius: 20px;
      transition: width 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>
  <a href="../index.html" class="back-btn">🏠 Home</a>

  <div class="game-header">
    <h1 class="game-title">🎈 Balloon Pop!</h1>
    <p class="game-subtitle">Click all the balloons to pop them! 💥</p>
  </div>

  <div class="score-bar">
    <div class="score-item">
      <div class="score-label">Popped</div>
      <div class="score-value" id="popped-count">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Left</div>
      <div class="score-value" id="left-count">20</div>
    </div>
    <div class="score-item">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>

  <div class="game-container" id="balloon-arena">
    <!-- Balloons injected by JS -->
    <div class="overlay" id="start-overlay">
      <div class="overlay-emoji">🎈</div>
      <div class="overlay-title">Balloon Pop!</div>
      <div class="overlay-msg">Pop all 20 balloons for Kushal's birthday! 🎉</div>
      <button class="btn btn-primary" onclick="startGame()">▶ START!</button>
    </div>
  </div>

  <div style="text-align:center; margin-top:0.5rem;">
    <button class="btn btn-success" onclick="startGame()">🔄 New Game</button>
  </div>

  <script src="../js/balloon.js"></script>
</body>
</html>
