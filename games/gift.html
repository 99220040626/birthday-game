<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎁 Gift Surprise! - Kushal's Birthday</title>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/games.css"/>
  <style>
    .gift-zone {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      max-width: 540px;
      width: 90%;
      margin: 1rem auto;
    }
    .gift-box {
      aspect-ratio: 1;
      background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(77,150,255,0.2));
      border: 3px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }
    .gift-box:hover:not(.opened) {
      transform: scale(1.08) rotate(2deg);
      border-color: var(--yellow);
      box-shadow: 0 10px 30px rgba(255,217,61,0.4);
    }
    .gift-box.opened {
      cursor: default;
      background: linear-gradient(135deg, rgba(107,203,119,0.3), rgba(77,150,255,0.3));
      border-color: var(--green);
    }
    .gift-emoji {
      font-size: 3.5rem;
      transition: all 0.4s;
      display: block;
    }
    .gift-box.opened .gift-emoji {
      animation: openBounce 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes openBounce {
      0%   { transform: scale(0) rotate(-180deg); }
      60%  { transform: scale(1.3) rotate(10deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .gift-msg {
      font-family: 'Fredoka One', cursive;
      font-size: 0.75rem;
      color: var(--yellow);
      text-align: center;
      padding: 0 4px;
      margin-top: 4px;
      display: none;
    }
    .gift-box.opened .gift-msg { display: block; animation: fadeInUp 0.4s ease; }
    .shine-ring {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
      top: -50%; left: -50%;
      pointer-events: none;
      animation: shineSpin 3s linear infinite;
      opacity: 0;
    }
    .gift-box:hover .shine-ring { opacity: 1; }
    @keyframes shineSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    #big-message {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      color: var(--yellow);
      text-shadow: 3px 3px 0 var(--orange);
      text-align: center;
      margin: 1rem;
      min-height: 2.5rem;
      animation: fadeInUp 0.5s ease;
    }
    #all-open-section {
      text-align: center;
      display: none;
      animation: fadeInUp 0.8s ease;
    }
    #all-open-section h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.5rem;
      color: var(--yellow);
      text-shadow: 3px 3px 0 var(--orange);
      margin-bottom: 1rem;
    }
    .open-counter {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.8);
      text-align: center;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <a href="../index.html" class="back-btn">🏠 Home</a>

  <div class="game-header">
    <h1 class="game-title">🎁 Gift Surprise!</h1>
    <p class="game-subtitle">Click each gift to reveal your surprise! 🎉</p>
  </div>

  <div class="score-bar">
    <div class="score-item">
      <div class="score-label">Opened</div>
      <div class="score-value" id="opened">0 / 9</div>
    </div>
    <div class="score-item">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
  </div>

  <div id="big-message">🎁 Click a gift to open it!</div>

  <div class="gift-zone" id="gift-zone">
    <!-- Generated by JS -->
  </div>

  <div id="all-open-section">
    <h2>🎉 All Gifts Opened! 🎉</h2>
    <p style="font-size:1.3rem; color:rgba(255,255,255,0.9); margin-bottom:1rem;">
      Happy Birthday Kushal! You're truly special! 🌟
    </p>
    <button class="btn btn-primary" onclick="initGame()">🔄 Play Again!</button>
    <a href="../index.html" class="btn btn-success" style="text-decoration:none;">🏠 Home</a>
  </div>

  <!-- Confetti overlay -->
  <div id="confetti-burst" style="position:fixed; inset:0; pointer-events:none; z-index:999;"></div>

  <script src="../js/gift.js"></script>
</body>
</html>
